<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Canvas</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="capacitor://localhost/capacitor.js"></script>
    <script src="lib/jsmidgen.js"></script>
    <script src="chord-intervals-config.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 16px;
            padding-top: calc(16px + env(safe-area-inset-top));
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            color: #111;
            background: #fff;
            font-size: 14px;
            line-height: 1.4;
        }
        main {
            max-width: 760px;
            margin: 0 auto;
        }
        h1 {
            margin: 0 0 12px 0;
            font-size: 28px;
            font-weight: 400;
            font-family: "Pacifico", cursive;
            cursor: pointer;
            touch-action: manipulation;
        }
        nav {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 0;
            border-bottom: 1px solid #ddd;
        }
        nav button {
            background: #f5f5f5;
            color: #111;
            border: 1px solid #ddd;
            border-bottom-color: #fff;
            border-radius: 6px 6px 0 0;
        }
        nav button.active {
            background: #fff;
            color: #111;
            border-color: #ddd;
            border-bottom-color: #fff;
            margin-bottom: -1.5px;
        }
        @media (max-width: 600px) {
            nav {
                gap: 4px;
            }
            nav button {
                padding: 4px 8px;
                font-size: 12px;
            }
        }
        section {
            border: 1px solid #e6e6e6;
            border-radius: 0;
            padding: 12px;
            margin-bottom: 12px;
        }
        section[hidden] {
            display: none;
        }
        #aboutModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        #aboutModal[aria-hidden="false"] {
            display: flex;
        }
        #aboutModal > div {
            background: #fff;
            border-radius: 6px;
            padding: 16px;
            max-width: 420px;
            width: 100%;
            border: 1px solid #ddd;
        }
        #aboutModal > div > div:first-child {
            font-family: "Pacifico", cursive;
            font-size: 24px;
            margin-bottom: 8px;
        }
        #aboutModal {
            color: #666;
        }
        #aboutModal a {
            color: #00CED1;
            text-decoration: none;
        }
        #aboutModal button {
            margin-top: 12px;
        }
        #helpModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: none;
            align-items: flex-end;
            justify-content: center;
            padding: 16px;
            z-index: 2;
        }
        #helpModal[aria-hidden="false"] {
            display: flex;
        }
        #helpModal > div {
            background: #fff;
            border-radius: 12px 12px 6px 6px;
            padding: 16px;
            max-width: 480px;
            width: 100%;
            border: 1px solid #ddd;
        }
        #helpModal p {
            margin: 0 0 12px;
        }
        #helpModal a {
            color: inherit;
            text-decoration: none;
        }
        #helpModal .help-controls {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        #contactModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: none;
            align-items: flex-end;
            justify-content: center;
            padding: 16px;
            z-index: 2;
        }
        #contactModal[aria-hidden="false"] {
            display: flex;
        }
        #contactModal > div {
            background: #fff;
            border-radius: 12px 12px 6px 6px;
            padding: 12px;
            max-width: 520px;
            width: 100%;
            border: 1px solid #ddd;
        }
        #contactModal {
            color: #666;
        }
        #contactModal a {
            color: #00CED1;
            text-decoration: none;
        }
        #presetsModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 2;
        }
        #presetsModal[aria-hidden="false"] {
            display: flex;
        }
        #presetsModal > div {
            background: #fff;
            border-radius: 8px;
            padding: 12px;
            max-width: 520px;
            width: 100%;
            border: 1px solid #ddd;
            max-height: 70vh;
            overflow: auto;
        }
        #presetsModal h2 {
            margin: 0 0 8px;
            font-size: 18px;
        }
        #presetsModal .help-controls {
            margin-top: 8px;
        }
        .preset-list {
            display: grid;
            gap: 6px;
        }
        .preset-item {
            border: 1px solid #e3e3e3;
            border-radius: 6px;
            padding: 8px;
            display: grid;
            gap: 4px;
        }
        .preset-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .preset-title {
            font-weight: 600;
            font-size: 13px;
        }
        .preset-tag {
            font-size: 11px;
            color: #555;
        }
        .preset-chords {
            font-size: 12px;
            color: #333;
        }
        .preset-use {
            padding: 4px 8px;
            font-size: 12px;
        }
        @media (min-width: 700px) {
            .preset-list {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
        .tour-highlight {
            position: relative;
            z-index: 3;
            outline: 2px solid #111;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.6);
            border-radius: 6px;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
        }
        textarea {
            width: 100%;
            min-height: 70px;
            border: 0;
            padding: 4px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            resize: vertical;
        }
        section > div {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        button {
            border: 1px solid #ccc;
            background: #111;
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        input[type="number"] {
            width: 90px;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        select {
            min-width: 180px;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
        }
        #chordPreview {
            margin-top: 8px;
            padding: 4px;
            min-height: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
        }
        .chord-preview-item {
            padding: 3px 8px;
            background: #ffffff;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            font-size: 12px;
            color: #1a1a1a;
            cursor: pointer;
        }
        .chord-preview-item.playing {
            border-color: #111;
            color: #111;
            background: #fff;
        }
        .chord-preview-empty {
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>
    <main>
        <h1>Chord Canvas</h1>

        <nav>
            <button type="button" data-panel="panel-sequence" class="active">Sequence</button>
            <button type="button" data-panel="panel-rhythm">Rhythms</button>
            <button type="button" data-panel="panel-pattern">Notes</button>
            <button type="button" data-panel="panel-volumemod">Volume Mod</button>
            <button type="button" data-panel="panel-delaymod">Delay Mod</button>
        </nav>

        <section id="panel-sequence">
            <textarea id="chordInput">C#sus4, E, G#m, F#, C#m, E, B, F#</textarea>
            <div id="chordPreview"></div>
            <div id="currentHighNotes"></div>
            <div>
                <button id="previewToggle">Tap to listen</button>
                
                <button id="presetsBtn" type="button">Chord Presets</button>
                <button id="exportBtn">Download MIDI</button>
                <button id="helpBtn" type="button">Guide</button>
                <button id="contactBtn" type="button">?</button>
            </div>
        </section>
        
        <section id="panel-rhythm" hidden>
            <div>
                <label for="bassRhythmSelect">Left</label>
                <select id="bassRhythmSelect"></select>
                <label for="highRhythmSelect">Right</label>
                <select id="highRhythmSelect"></select>
            </div>
            <div>
                <label for="bpmInput">BPM</label>
                <input id="bpmInput" type="number" min="40" max="240" value="120">
            </div>
        </section>

        <section id="panel-pattern" hidden>
            <div>
                <label for="patternSelect">Pattern</label>
                <select id="patternSelect">
                    <option value="normal" selected>normal</option>
                    <option value="ascend">ascend</option>
                    <option value="descend">descend</option>
                    <option value="ascend2">ascend2</option>
                    <option value="descend2">descend2</option>
                </select>
                <label><input type="checkbox" id="doubleHighNotes">Double Octave</label>
            
            </div>
            
            
            <div>
                <label for="skipSelect">Skip every</label>
                <select id="skipSelect">
                    <option value="0" selected>none</option>
                    <option value="2">2nd</option>
                    <option value="3">3rd</option>
                    <option value="4">4th</option>
                    <option value="5">5th</option>
                    <option value="6">6th</option>
                    <option value="7">7th</option>
                    <option value="8">8th</option>
                </select>
                <select id="skipSelect2">
                    <option value="0" selected>none</option>
                    <option value="2">2nd</option>
                    <option value="3">3rd</option>
                    <option value="4">4th</option>
                    <option value="5">5th</option>
                    <option value="6">6th</option>
                    <option value="7">7th</option>
                    <option value="8">8th</option>
                </select>
                <select id="skipSelect3">
                    <option value="0" selected>none</option>
                    <option value="2">2nd</option>
                    <option value="3">3rd</option>
                    <option value="4">4th</option>
                    <option value="5">5th</option>
                    <option value="6">6th</option>
                    <option value="7">7th</option>
                    <option value="8">8th</option>
                </select>
            </div>
        </section>

        <section id="panel-volumemod" hidden>
            <div>
                <label for="volumeModSelect">Volume Modulation</label>
                <select id="volumeModSelect">
                    <option value="none">none</option>
                    <option value="uphill" selected>uphill</option>
                    <option value="downhill">downhill</option>
                    <option value="valley">valley</option>
                    <option value="hill">hill</option>
                    <option value="2hill">2hill</option>
                    <option value="4hill">4hill</option>
                </select>
            </div>
        </section>

        <section id="panel-delaymod" hidden>
            <div>
                <label for="delayModSelect">Delay Modulation</label>
                <select id="delayModSelect">
                    <option value="none">none</option>
                    <option value="human">human</option>
                    <option value="drunk" selected>drunk</option>
                </select>
            </div>
        </section>
    </main>

    <div id="aboutModal" aria-hidden="true">
        <div>
            <div>Chord Canvas </div> Version 1.54 
            <div>developed by <a href="https://youtube.com/beatsaway" target="_blank" rel="noopener noreferrer">Beats Away</a>, a music producer that can code.
            <a href="https://buymeacoffee.com/beatsaway" target="_blank" rel="noopener noreferrer">To support this free app, buy him a coffee🤗☕</a></div>
            <button id="aboutClose" type="button">Close</button>
        </div>
    </div>

    <div id="helpModal" aria-hidden="true">
        <div>
            <p id="helpText"></p>
            <div class="help-controls">
                <button id="helpPrev" type="button">Back</button>
                <button id="helpNext" type="button">Next</button>
                <button id="helpClose" type="button">Close</button>
            </div>
        </div>
    </div>

    <div id="presetsModal" aria-hidden="true">
        <div>
            <h2>Chord Presets</h2>
            <div class="preset-list" id="presetsList"></div>
            <div class="help-controls">
                <button id="presetsClose" type="button">Close</button>
            </div>
        </div>
    </div>

    <div id="contactModal" aria-hidden="true">
        <div>
            <p>Link to this web app: <a href="https://chordcanvas.netlify.app/" target="_blank" rel="noopener noreferrer">chordcanvas.netlify.app</a></p>
            <p>Have fun! If you have any suggestions/questions, please message <a href="https://www.instagram.com/beats.away" target="_blank" rel="noopener noreferrer">instagram.com/beats.away</a>.</p>
            <div class="help-controls">
                <button id="contactClose" type="button">Close</button>
            </div>
        </div>
    </div>

    <script src="chord-presets.js"></script>
    <script src="core.js" defer></script>
    <script src="app.js" defer></script>
</body>
</html>
