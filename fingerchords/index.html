<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test3 – Bouncy balls</title>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #000; }
        .container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        #webcam { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        #status { display: none; }
        #chord-label { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div id="status">Loading...</div>
        <div id="chord-label" aria-live="polite"></div>
    </div>

    <script type="module">
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusElement = document.getElementById('status');
        const chordLabelEl = document.getElementById('chord-label');

        let audioCtx = null;
        const POP_PITCH_MIN = 65;
        const POP_PITCH_MAX = 620;
        const WRIST_THUMB_PITCH_MIN = 28;
        const WRIST_THUMB_PITCH_RANGE = 75;
        const SUSTAIN_MIN = 0.06;
        const SUSTAIN_MAX = 0.28;
        function wristThumbNorm(wristThumbDistPx) {
            return (wristThumbDistPx == null)
                ? 0.5
                : Math.min(1, Math.max(0, (wristThumbDistPx - WRIST_THUMB_PITCH_MIN) / WRIST_THUMB_PITCH_RANGE));
        }
        function popPitchFromWristThumb(wristThumbDistPx) {
            const norm = wristThumbNorm(wristThumbDistPx);
            return POP_PITCH_MIN + norm * (POP_PITCH_MAX - POP_PITCH_MIN);
        }
        const POP_VOLUME_CHORD_MODE = 0.3;
        function playPopSound(wristThumbDistPx, volumeScale) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const baseFreq = popPitchFromWristThumb(wristThumbDistPx);
            const vol = (volumeScale != null ? volumeScale : 1) * 0.2;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(baseFreq + (Math.random() - 0.5) * 80, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.06);
        }
        function playChordNoteSpawn(freq, sustainDuration) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            const t0 = audioCtx.currentTime;
            osc.frequency.setValueAtTime(freq, t0);
            gain.gain.setValueAtTime(0, t0);
            gain.gain.linearRampToValueAtTime(0.14, t0 + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, t0 + sustainDuration);
            osc.start(t0);
            osc.stop(t0 + sustainDuration);
        }
        function playReversePopSound(wristThumbDistPx) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const startFreq = popPitchFromWristThumb(wristThumbDistPx);
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            const t0 = audioCtx.currentTime;
            const dur = 0.14;
            osc.frequency.setValueAtTime(startFreq, t0);
            osc.frequency.exponentialRampToValueAtTime(55, t0 + dur);
            gain.gain.setValueAtTime(0.001, t0);
            gain.gain.linearRampToValueAtTime(0.18, t0 + 0.03);
            gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
            osc.start(t0);
            osc.stop(t0 + dur);
        }
        const REVERSE_CHORD_DUR_MIN = 0.1;
        const REVERSE_CHORD_DUR_MAX = 0.2;
        function playReverseChordNote(chordNum, wristThumbDistPx) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const tones = CHORD_TONES[chordNum];
            if (!tones || tones.length === 0) return;
            const baseFreq = tones[Math.floor(Math.random() * tones.length)];
            const startFreq = baseFreq * 2;
            const endFreq = baseFreq * 0.5;
            const dur = REVERSE_CHORD_DUR_MIN + wristThumbNorm(wristThumbDistPx) * (REVERSE_CHORD_DUR_MAX - REVERSE_CHORD_DUR_MIN);
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            const t0 = audioCtx.currentTime;
            osc.frequency.setValueAtTime(startFreq, t0);
            osc.frequency.exponentialRampToValueAtTime(endFreq, t0 + dur);
            gain.gain.setValueAtTime(0.001, t0);
            gain.gain.linearRampToValueAtTime(0.16, t0 + 0.025);
            gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
            osc.start(t0);
            osc.stop(t0 + dur);
        }

        const BALL_RADIUS_MAX = 28;
        const BALL_RADIUS_MIN = 10;
        const WRIST_THUMB_RADIUS_MIN = 28;
        const WRIST_THUMB_RADIUS_RANGE = 75;
        const BALL_SPEED = 3.5;
        const SWIPE_DIST = 70;
        const SWIPE_PUSH = 14;
        const BALL_BOUNCE = 1.35;
        const POP_COOLDOWN_MS = 100;
        const MAX_SPEED = 16;
        const MAX_SPEED_SUCK = 42;
        const SUCK_RANGE = 420;
        const SPAWN_INTERVAL_MS = 55;
        const SUCK_STRENGTH = 7.2;
        const SUCK_SPIRAL = 0.65;
        const SUCK_DISAPPEAR_DIST = 48;
        const BLACKHOLE_RADIUS = 56;
        let balls = [];
        let lastSpawnTime = 0;
        let lastRightWristThumbDistPx = 50;
        const PALM_LANDMARK_INDICES = [0, 5, 9, 13, 17];

        const GESTURE_TO_NUMBER = {
            'Closed_Fist': 0, 'Pointing_Up': 1, 'Victory': 2, 'ILoveYou': 3, 'Open_Palm': 5
        };
        function isThreeFingersUp(landmarks) {
            if (!landmarks || landmarks.length < 21) return false;
            const tipY = (i) => landmarks[i].y;
            return tipY(8) < tipY(6) && tipY(12) < tipY(10) && tipY(16) < tipY(14) && tipY(4) >= tipY(3) - 0.05 && tipY(20) >= tipY(18) - 0.05;
        }
        function isFourFingersUp(landmarks) {
            if (!landmarks || landmarks.length < 21) return false;
            const tipY = (i) => landmarks[i].y;
            return tipY(8) < tipY(6) && tipY(12) < tipY(10) && tipY(16) < tipY(14) && tipY(20) < tipY(18) && tipY(4) >= tipY(3) - 0.05;
        }
        function gestureToNumber(gestureName, landmarks) {
            if (gestureName && GESTURE_TO_NUMBER.hasOwnProperty(gestureName)) return GESTURE_TO_NUMBER[gestureName];
            if (landmarks && isThreeFingersUp(landmarks)) return 3;
            if (landmarks && isFourFingersUp(landmarks)) return 4;
            return null;
        }

        const CHORD_TONES = {
            0: [220, 261.63, 329.63, 392, 493.88],
            1: [261.63, 329.63, 392, 493.88],
            2: [293.66, 349.23, 440, 523.25, 392],
            3: [329.63, 392, 493.88, 587.33, 369.99],
            4: [349.23, 440, 523.25, 659.25, 392],
            5: [392, 493.88, 587.33, 739.99, 440]
        };
        function spawnOneBall(palmCenterPx, wristThumbDistPx, leftChordNum) {
            const w = canvasElement.width;
            const h = canvasElement.height;
            const n = balls.length;
            const norm = wristThumbDistPx != null
                ? Math.min(1, Math.max(0, (wristThumbDistPx - WRIST_THUMB_RADIUS_MIN) / WRIST_THUMB_RADIUS_RANGE))
                : 0.5;
            const radius = BALL_RADIUS_MIN + norm * (BALL_RADIUS_MAX - BALL_RADIUS_MIN);
            let x, y;
            if (palmCenterPx) {
                x = palmCenterPx.x;
                y = palmCenterPx.y;
            } else {
                x = radius + Math.random() * (w - 2 * radius);
                y = radius + Math.random() * (h - 2 * radius);
            }
            balls.push({
                x, y,
                vx: (Math.random() - 0.5) * 2 * BALL_SPEED,
                vy: (Math.random() - 0.5) * 2 * BALL_SPEED,
                radius,
                lastPopTime: 0,
                color: `hsla(${30 + (n % 20) * 18}, 92%, 58%, 0.95)`
            });
            if (leftChordNum != null && leftChordNum >= 0 && leftChordNum <= 5 && CHORD_TONES[leftChordNum]) {
                const tones = CHORD_TONES[leftChordNum];
                const freq = tones[Math.floor(Math.random() * tones.length)];
                const sustain = SUSTAIN_MIN + wristThumbNorm(wristThumbDistPx) * (SUSTAIN_MAX - SUSTAIN_MIN);
                playChordNoteSpawn(freq, sustain);
            } else {
                playPopSound(palmCenterPx ? wristThumbDistPx : undefined);
            }
        }

        const CHORD_ROMAN = { 0: 'Am9', 1: 'Cmaj7', 2: 'Dm11', 3: 'Em9', 4: 'Fmaj9', 5: 'Gmaj9' };
        function buildDescendingTripleOctave(tonesMid) {
            const high = tonesMid.map(f => f * 2);
            const mid = tonesMid.map(f => f);
            const low = tonesMid.map(f => f * 0.5);
            return [...high].reverse().concat([...mid].reverse()).concat([...low].reverse());
        }
        const ARPEGGIO_PATTERNS = {
            0: buildDescendingTripleOctave([220, 261.63, 329.63, 392, 493.88]),
            1: buildDescendingTripleOctave([261.63, 329.63, 392, 493.88]),
            2: buildDescendingTripleOctave([293.66, 349.23, 440, 523.25, 392]),
            3: buildDescendingTripleOctave([329.63, 392, 493.88, 587.33, 369.99]),
            4: buildDescendingTripleOctave([349.23, 440, 523.25, 659.25, 392]),
            5: buildDescendingTripleOctave([392, 493.88, 587.33, 739.99, 440])
        };
        const ARP_NOTE_DURATION = 0.09;
        const ARP_STEP_MS = 95;
        let arpeggioIntervalId = null;
        let currentArpeggioNum = null;
        let currentSawMix = 0;

        function playArpeggioNote(freq) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const useSaw = currentSawMix > 0.35;
            osc.type = useSaw ? 'sawtooth' : 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if (useSaw) {
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(2000, audioCtx.currentTime);
                osc.connect(filter);
                filter.connect(gain);
            } else {
                osc.connect(gain);
            }
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.015);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + ARP_NOTE_DURATION);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + ARP_NOTE_DURATION);
        }
        function startArpeggio(leftNum) {
            if (currentArpeggioNum === leftNum) return;
            stopArpeggio();
            const pattern = ARPEGGIO_PATTERNS[leftNum];
            if (!pattern) return;
            currentArpeggioNum = leftNum;
            let idx = 0;
            arpeggioIntervalId = setInterval(() => {
                playArpeggioNote(pattern[idx]);
                idx = (idx + 1) % pattern.length;
            }, ARP_STEP_MS);
        }
        function stopArpeggio() {
            if (arpeggioIntervalId) {
                clearInterval(arpeggioIntervalId);
                arpeggioIntervalId = null;
            }
            currentArpeggioNum = null;
        }

        const RIGHT_FINGER_TIP_INDICES = [4, 8, 12, 16, 20];
        function updateBalls(rightFingerTipsPx, rightPalmCenterPx, rightHandClosed, rightWristThumbDistPx, leftChordNum) {
            const w = canvasElement.width;
            const h = canvasElement.height;
            const now = Date.now();
            if (rightHandClosed && rightPalmCenterPx) {
                const px = rightPalmCenterPx.x;
                const py = rightPalmCenterPx.y;
                for (let i = balls.length - 1; i >= 0; i--) {
                    const b = balls[i];
                    const dx = px - b.x;
                    const dy = py - b.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < SUCK_DISAPPEAR_DIST) {
                        balls.splice(i, 1);
                        if (leftChordNum != null && leftChordNum >= 0 && leftChordNum <= 5) {
                            playReverseChordNote(leftChordNum, rightWristThumbDistPx);
                        } else {
                            playReversePopSound(rightWristThumbDistPx);
                        }
                        continue;
                    }
                    const d = Math.max(dist, 8);
                    const innerZone = dist < 95;
                    let pull = SUCK_STRENGTH * (SUCK_RANGE / d);
                    let spiral = SUCK_SPIRAL * (SUCK_RANGE / d);
                    if (innerZone) {
                        pull *= 2;
                        spiral *= 0.3;
                    }
                    const nx = dx / dist;
                    const ny = dy / dist;
                    b.vx += nx * pull + (-ny) * spiral;
                    b.vy += ny * pull + nx * spiral;
                }
            }
            for (let i = 0; i < balls.length; i++) {
                const b = balls[i];
                b.x += b.vx;
                b.y += b.vy;
                if (b.x - b.radius <= 0) { b.x = b.radius; b.vx = Math.abs(b.vx); }
                if (b.x + b.radius >= w) { b.x = w - b.radius; b.vx = -Math.abs(b.vx); }
                if (b.y - b.radius <= 0) { b.y = b.radius; b.vy = Math.abs(b.vy); }
                if (b.y + b.radius >= h) { b.y = h - b.radius; b.vy = -Math.abs(b.vy); }
                for (let j = i + 1; j < balls.length; j++) {
                    const o = balls[j];
                    const dx = o.x - b.x;
                    const dy = o.y - b.y;
                    const dist = Math.hypot(dx, dy);
                    const minDist = b.radius + o.radius;
                    if (dist < minDist && dist > 0.01) {
                        const nx = dx / dist;
                        const ny = dy / dist;
                        const overlap = minDist - dist;
                        b.x -= nx * overlap * 0.5;
                        b.y -= ny * overlap * 0.5;
                        o.x += nx * overlap * 0.5;
                        o.y += ny * overlap * 0.5;
                        const dvx = b.vx - o.vx;
                        const dvy = b.vy - o.vy;
                        const dvn = dvx * nx + dvy * ny;
                        if (dvn > 0) {
                            const bounce = BALL_BOUNCE;
                            b.vx -= dvn * nx * bounce;
                            b.vy -= dvn * ny * bounce;
                            o.vx += dvn * nx * bounce;
                            o.vy += dvn * ny * bounce;
                        }
                    }
                }
                        if (!rightHandClosed && rightFingerTipsPx && rightFingerTipsPx.length > 0 && now - b.lastPopTime > POP_COOLDOWN_MS) {
                            for (const tip of rightFingerTipsPx) {
                                const dx = b.x - tip.x;
                                const dy = b.y - tip.y;
                                const dist = Math.hypot(dx, dy);
                                if (dist < SWIPE_DIST && dist > 1) {
                                    const n = SWIPE_PUSH / dist;
                                    b.vx += dx * n;
                                    b.vy += dy * n;
                                    b.lastPopTime = now;
                                    playPopSound(rightWristThumbDistPx, (leftChordNum != null && leftChordNum >= 0 && leftChordNum <= 5) ? POP_VOLUME_CHORD_MODE : 1);
                                    break;
                                }
                            }
                        }
                const s = Math.hypot(b.vx, b.vy);
                const maxSp = (rightHandClosed && rightPalmCenterPx && Math.hypot(b.x - rightPalmCenterPx.x, b.y - rightPalmCenterPx.y) < SUCK_RANGE) ? MAX_SPEED_SUCK : MAX_SPEED;
                if (s > maxSp) {
                    b.vx *= maxSp / s;
                    b.vy *= maxSp / s;
                }
            }
        }

        function drawBalls() {
            balls.forEach(b => {
                canvasCtx.fillStyle = b.color;
                canvasCtx.beginPath();
                canvasCtx.arc(b.x, b.y, b.radius, 0, 2 * Math.PI);
                canvasCtx.fill();
            });
        }

        function drawChordOnHand(palmPx, chordRoman) {
            if (!palmPx || !chordRoman) return;
            const cx = palmPx.x;
            const cy = palmPx.y;
            const fontSize = Math.min(42, Math.max(24, Math.min(canvasElement.width, canvasElement.height) * 0.06));
            canvasCtx.font = `600 ${fontSize}px system-ui, sans-serif`;
            canvasCtx.textAlign = 'center';
            canvasCtx.textBaseline = 'middle';
            canvasCtx.fillStyle = 'rgba(255,255,255,0.95)';
            canvasCtx.save();
            canvasCtx.translate(cx, cy);
            canvasCtx.scale(-1, 1);
            canvasCtx.translate(-cx, -cy);
            canvasCtx.fillText(chordRoman, cx, cy);
            canvasCtx.restore();
        }

        function drawBlackHole(palmPx) {
            if (!palmPx) return;
            const r = BLACKHOLE_RADIUS;
            const g = canvasCtx.createRadialGradient(palmPx.x, palmPx.y, 0, palmPx.x, palmPx.y, r);
            g.addColorStop(0, 'rgba(0, 0, 0, 0.95)');
            g.addColorStop(0.4, 'rgba(20, 20, 30, 0.85)');
            g.addColorStop(0.7, 'rgba(60, 60, 80, 0.4)');
            g.addColorStop(1, 'rgba(80, 80, 100, 0)');
            canvasCtx.fillStyle = g;
            canvasCtx.beginPath();
            canvasCtx.arc(palmPx.x, palmPx.y, r, 0, 2 * Math.PI);
            canvasCtx.fill();
            canvasCtx.strokeStyle = 'rgba(120, 120, 140, 0.6)';
            canvasCtx.lineWidth = 2;
            canvasCtx.beginPath();
            canvasCtx.arc(palmPx.x, palmPx.y, r * 0.6, 0, 2 * Math.PI);
            canvasCtx.stroke();
        }

        function updateCanvasSize() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        function initializeLayout() { updateCanvasSize(); }
        window.addEventListener('resize', () => {
            initializeLayout();
            if (balls.length > 0) {
                const w = canvasElement.width;
                const h = canvasElement.height;
                balls.forEach(b => {
                    b.x = Math.max(b.radius, Math.min(w - b.radius, b.x));
                    b.y = Math.max(b.radius, Math.min(h - b.radius, b.y));
                });
            }
        });
        initializeLayout();

        async function initWebcam() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' } });
            videoElement.srcObject = stream;
            return new Promise((resolve) => { videoElement.onloadedmetadata = () => { initializeLayout(); resolve(videoElement); }; });
        }

        function drawLandmarks(landmarks, isLeft) {
            const w = canvasElement.width;
            const h = canvasElement.height;
            const lineWidth = Math.max(2, Math.min(5, Math.min(w, h) / 300));
            const pointSize = Math.max(2, Math.min(8, Math.min(w, h) / 250));
            const connections = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[0,5],[5,9],[9,13],[13,17]];
            const handColor = 'rgba(170, 175, 185, 0.9)';
            canvasCtx.lineWidth = lineWidth;
            canvasCtx.strokeStyle = handColor;
            connections.forEach(([i, j]) => {
                canvasCtx.beginPath();
                canvasCtx.moveTo(landmarks[i].x * w, landmarks[i].y * h);
                canvasCtx.lineTo(landmarks[j].x * w, landmarks[j].y * h);
                canvasCtx.stroke();
            });
            landmarks.forEach((lm, idx) => {
                canvasCtx.fillStyle = (idx === 4 || idx === 8) ? 'rgba(200, 205, 215, 0.95)' : handColor;
                canvasCtx.beginPath();
                canvasCtx.arc(lm.x * w, lm.y * h, pointSize * 1.2, 0, 2 * Math.PI);
                canvasCtx.fill();
            });
        }

        async function startApp() {
            try {
                statusElement.textContent = 'Loading MediaPipe...';
                const mpVision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs');
                const GestureRecognizer = mpVision.GestureRecognizer;
                const FilesetResolver = mpVision.FilesetResolver;
                const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
                const gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task' },
                    runningMode: 'VIDEO',
                    numHands: 2
                });
                await initWebcam();
                statusElement.textContent = 'Ready';

                let lastVideoTime = -1;
                function processFrame() {
                    if (videoElement.readyState < 2) { requestAnimationFrame(processFrame); return; }
                    const now = videoElement.currentTime * 1000;
                    if (now !== lastVideoTime) {
                        lastVideoTime = now;
                        const result = gestureRecognizer.recognizeForVideo(videoElement, now);
                        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                        if (canvasElement.width !== window.innerWidth || canvasElement.height !== window.innerHeight) updateCanvasSize();

                        let rightFingerTipsPx = [];
                        let rightPalmCenterPx = null;
                        let leftHandNum = null;
                        let leftPalmCenterPx = null;
                        let rightHandNum = null;
                        const w = canvasElement.width;
                        const h = canvasElement.height;
                        if (result.landmarks && result.landmarks.length > 0) {
                            for (let i = 0; i < result.landmarks.length; i++) {
                                const landmarks = result.landmarks[i];
                                const handedness = result.handedness && result.handedness[i] && result.handedness[i][0];
                                const isLeft = handedness ? handedness.categoryName === 'Left' : (i === 0);
                                drawLandmarks(landmarks, isLeft);
                                const gesture = result.gestures && result.gestures[i] && result.gestures[i][0];
                                const name = gesture ? gesture.categoryName : 'None';
                                const num = gestureToNumber(name, landmarks);
                                if (isLeft) {
                                    leftHandNum = num;
                                    if (landmarks.length >= 21) {
                                        const palm = PALM_LANDMARK_INDICES.reduce((acc, idx) => ({
                                            x: acc.x + landmarks[idx].x,
                                            y: acc.y + landmarks[idx].y
                                        }), { x: 0, y: 0 });
                                        const n = PALM_LANDMARK_INDICES.length;
                                        leftPalmCenterPx = { x: (palm.x / n) * w, y: (palm.y / n) * h };
                                        const wristThumbDistPx = Math.hypot(
                                            (landmarks[2].x - landmarks[0].x) * w,
                                            (landmarks[2].y - landmarks[0].y) * h
                                        );
                                        currentSawMix = Math.min(1, Math.max(0, (wristThumbDistPx - 28) / 75));
                                    }
                                } else {
                                    rightHandNum = num;
                                    if (landmarks.length >= 21) {
                                        lastRightWristThumbDistPx = Math.hypot(
                                            (landmarks[2].x - landmarks[0].x) * w,
                                            (landmarks[2].y - landmarks[0].y) * h
                                        );
                                        rightFingerTipsPx = RIGHT_FINGER_TIP_INDICES.map(idx => ({
                                            x: landmarks[idx].x * w,
                                            y: landmarks[idx].y * h
                                        }));
                                        const palm = PALM_LANDMARK_INDICES.reduce((acc, idx) => ({
                                            x: acc.x + landmarks[idx].x,
                                            y: acc.y + landmarks[idx].y
                                        }), { x: 0, y: 0 });
                                        const n = PALM_LANDMARK_INDICES.length;
                                        rightPalmCenterPx = { x: (palm.x / n) * w, y: (palm.y / n) * h };
                                    }
                                }
                            }
                        } else {
                            currentSawMix = 0;
                        }
                        const t = Date.now();
                        if (rightHandNum === 5 && t - lastSpawnTime >= SPAWN_INTERVAL_MS && rightPalmCenterPx) {
                            spawnOneBall(rightPalmCenterPx, lastRightWristThumbDistPx, leftHandNum);
                            lastSpawnTime = t;
                        }
                        if (leftHandNum >= 0 && leftHandNum <= 5) {
                            startArpeggio(leftHandNum);
                        } else {
                            stopArpeggio();
                        }
                        updateBalls(rightFingerTipsPx, rightPalmCenterPx, rightHandNum === 0, lastRightWristThumbDistPx, leftHandNum);
                        drawBalls();
                        if (rightHandNum === 0 && rightPalmCenterPx) drawBlackHole(rightPalmCenterPx);
                        if (leftHandNum >= 0 && leftHandNum <= 5 && leftPalmCenterPx) drawChordOnHand(leftPalmCenterPx, CHORD_ROMAN[leftHandNum]);
                    }
                    requestAnimationFrame(processFrame);
                }
                processFrame();
            } catch (e) {
                statusElement.textContent = 'Error: ' + e.message;
                console.error(e);
            }
        }
        startApp();
    </script>
