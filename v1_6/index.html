            // Universal camera transition function
            // Gradually transitions camera parameters to target settings
            // Made globally available for use elsewhere
            window.transitionCameraTo = function(targetView, duration = 1000, tolerance = 0.01) {
                if (!window.camera || !window.controls) {
                    console.warn('Camera or controls not available');
                    return;
                }
                
                const camera = window.camera;
                const controls = window.controls;
                
                // Get current values

                    x: camera.position.x,
                    y: camera.position.y,
                    z: camera.position.z

                    y: camera.rotation.y,
                    z: camera.rotation.z

                    y: controls.target.y,
                    z: controls.target.z

                        x: startPosition.x + (targetPosition.x - startPosition.x) * eased,
                        y: startPosition.y + (targetPosition.y - startPosition.y) * eased,
                        z: startPosition.z + (targetPosition.z - startPosition.z) * eased
                    };
                    
                    // Interpolate rotation
                    const currentRotation = {
                        x: startRotation.x + (targetRotation.x - startRotation.x) * eased,
                        y: startRotation.y + (targetRotation.y - startRotation.y) * eased,
                        z: startRotation.z + (targetRotation.z - startRotation.z) * eased
                    };
                    
                    // Interpolate target
                    const currentTarget = {
                        x: startTarget.x + (targetTarget.x - startTarget.x) * eased,
                        y: startTarget.y + (targetTarget.y - startTarget.y) * eased,
                        z: startTarget.z + (targetTarget.z - startTarget.z) * eased
                    };
                    
                    // Apply values
                    camera.position.set(currentPosition.x, currentPosition.y, currentPosition.z);
                    camera.rotation.set(currentRotation.x, currentRotation.y, currentRotation.z);
                    controls.target.set(currentTarget.x, currentTarget.y, currentTarget.z);
                    controls.update();
                    
                    // Check if we're close enough to target (within tolerance)
                    const positionDiff = Math.sqrt(
                        Math.pow(currentPosition.x - targetPosition.x, 2) +
                        Math.pow(currentPosition.y - targetPosition.y, 2) +
                        Math.pow(currentPosition.z - targetPosition.z, 2)
                    );
                    const rotationDiff = Math.sqrt(
                        Math.pow(currentRotation.x - targetRotation.x, 2) +
                        Math.pow(currentRotation.y - targetRotation.y, 2) +
                        Math.pow(currentRotation.z - targetRotation.z, 2)
                    );
                    const targetDiff = Math.sqrt(
                        Math.pow(currentTarget.x - targetTarget.x, 2) +
                        Math.pow(currentTarget.y - targetTarget.y, 2) +
                        Math.pow(currentTarget.z - targetTarget.z, 2)
                    );
                    
                    // Continue animation if not complete
                    if (progress < 1 && (positionDiff > tolerance || rotationDiff > tolerance || targetDiff > tolerance)) {
                        requestAnimationFrame(animate);
                    } else {
                        // Snap to exact target values at the end
                        camera.position.set(targetPosition.x, targetPosition.y, targetPosition.z);
                        camera.rotation.set(targetRotation.x, targetRotation.y, targetRotation.z);
                        controls.target.set(targetTarget.x, targetTarget.y, targetTarget.z);
                        controls.update();
                    }
                }
                
                animate();
            }

            // Rhythm Grid System
            const DURATION_MULTIPLIERS = [null, 240, 120, 60, 40, 30, 20, 15];
            let currentBassDuration = 240;
            let currentHighDuration = 30;
            let pendingBassDuration = null;
            let pendingHighDuration = null;

            // Cell sequence system
            let cellSequence = []; // Array of {row, col} objects
            let currentSequenceIndex = 0;

            // Map duration multipliers to musical note names
            const NOTE_NAMES = {
                240: 'Semibreve (Whole Note)',
                120: 'Minim (Half Note)',
                60: 'Crotchet (Quarter Note)',
                40: 'Minim Triplet',
                30: 'Quaver (Eighth Note)',
                20: 'Crotchet Triplet',
                15: 'Semiquaver (Sixteenth Note)'
            };
            
            function calculateHeaders(bpm) {
                const noteSymbols = ['', '𝅝', '𝅗𝅥', '𝅘𝅥', '𝅘𝅥₃', '𝅘𝅥𝅮', '𝅘𝅥𝅮₃', '𝅘𝅥𝅯'];
                const headers = [''];
                for (let i = 1; i < DURATION_MULTIPLIERS.length; i++) {
                    const seconds = DURATION_MULTIPLIERS[i] / bpm;
                    const formatted = seconds.toFixed(2);
                    headers.push(noteSymbols[i] + ' ' + formatted + 's');
                }
                return headers;
            }
            
            function getNoteName(multiplier) {
                return NOTE_NAMES[multiplier] || '';
            }
            
            // Convert row/col to Excel-style cell reference (A1, B2, etc.)
            function getCellLabel(row, col) {
                // Row 1-7 maps to A-G, Column 1-7 maps to 1-7
                const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];
                if (row >= 1 && row <= 7 && col >= 1 && col <= 7) {
                    return letters[row - 1] + col;
                }
                return '';
            }
            
            // Convert Excel-style cell reference to row/col
            function parseCellLabel(label) {
                const trimmed = label.trim().toUpperCase();
                if (trimmed.length < 2) return null;
                
                const letter = trimmed[0];
                const number = parseInt(trimmed.substring(1));
                
                const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];
                const row = letters.indexOf(letter) + 1;
                
                if (row >= 1 && row <= 7 && number >= 1 && number <= 7) {
                    return { row: row, col: number };
                }
                return null;
            }
            
            function createRhythmGrid() {
                const grid = document.getElementById('rhythmGrid');
                if (!grid) return;
                
                grid.innerHTML = '';
                const currentBPM = parseInt(document.getElementById('bpm-input')?.value || 120);
                const headers = calculateHeaders(currentBPM);
                
                for (let row = 0; row < 8; row++) {
                    for (let col = 0; col < 8; col++) {
                        const cell = document.createElement('div');
                        cell.className = 'grid-cell';
                        
                        if (row === 0 || col === 0) {
                            cell.className += ' header';
                            if (row === 0 && col === 0) {
                                cell.textContent = '';
                            } else if (row === 0) {
                                cell.className += ' col-header';
                                cell.textContent = headers[col] || '';
                                // Add title attribute with note name
                                const multiplier = DURATION_MULTIPLIERS[col];
                                if (multiplier) {
                                    const noteName = getNoteName(multiplier);
                                    if (noteName) {
                                        cell.title = noteName;
                                    }
                                }
                            } else {
                                cell.className += ' row-header';
                                cell.textContent = headers[row] || '';
                                // Add title attribute with note name
                                const multiplier = DURATION_MULTIPLIERS[row];
                                if (multiplier) {
                                    const noteName = getNoteName(multiplier);
                                    if (noteName) {
                                        cell.title = noteName;
                                    }
                                }
                            }
                        } else {
                            cell.dataset.row = row;
                            cell.dataset.col = col;
                            cell.dataset.cellLabel = getCellLabel(row, col);
                            // Add cell label as text content
                            cell.textContent = getCellLabel(row, col);
                            cell.addEventListener('click', () => {
                                handleGridCellClick(row, col, cell);
                            });
                        }
                        
                        grid.appendChild(cell);
                    }
                }
                
                // Set default active cell (row 1, col 5 = A5)
                const defaultCell = grid.querySelector('.grid-cell[data-row="1"][data-col="5"]');
                if (defaultCell) {
                    defaultCell.classList.add('active');
                    // Set default durations
                    currentBassDuration = DURATION_MULTIPLIERS[1]; // 240
                    currentHighDuration = DURATION_MULTIPLIERS[5]; // 30
                    activeCellRow = 1;
                    activeCellCol = 5;
                }
                
                // Setup tooltips for headers
                setTimeout(() => {
                    const headers = grid.querySelectorAll('.header');
                    headers.forEach(header => {
                        if (header.title && !header.hasAttribute('data-tooltip-setup')) {
                            header.setAttribute('data-tooltip-setup', 'true');
                            header.addEventListener('click', function(e) {
                                e.preventDefault();
                                e.stopPropagation();
                                if (this.title) {
                                    const tooltip = document.createElement('div');
                                    tooltip.textContent = this.title;
                                    tooltip.style.cssText = 'position: fixed; background: rgba(0, 0, 0, 0.9); color: white; padding: 8px 12px; border-radius: 4px; z-index: 10000; pointer-events: none; font-size: 13px; max-width: 300px; word-wrap: break-word;';
                                    document.body.appendChild(tooltip);
                                    
                                    const rect = this.getBoundingClientRect();
                                    tooltip.style.left = (rect.left + rect.width / 2 - tooltip.offsetWidth / 2) + 'px';
                                    tooltip.style.top = (rect.top - tooltip.offsetHeight - 8) + 'px';
                                    
                                    setTimeout(() => {
                                        if (tooltip.parentElement) {
                                            tooltip.parentElement.removeChild(tooltip);
                                        }
                                    }, 2000);
                                }
                            });
                        }
                    });
                }, 10);
            }
            
            function handleGridCellClick(row, col, cell) {
                // Row determines bass note rhythm, Column determines high note rhythm
                const bassDurationMultiplier = DURATION_MULTIPLIERS[row];
                const highDurationMultiplier = DURATION_MULTIPLIERS[col];
                
                if (!bassDurationMultiplier || !highDurationMultiplier) return;
                
                const isPlaying = window.getIsPlaying && window.getIsPlaying();
                
                if (isPlaying) {
                    // If playing, set as pending (will apply on next cycle)
                    document.querySelectorAll('#rhythmGrid .grid-cell.pending').forEach(c => {
                        c.classList.remove('pending');
                    });
                    cell.classList.add('pending');
                    pendingBassDuration = bassDurationMultiplier;
                    pendingHighDuration = highDurationMultiplier;
                    pendingCellRow = row;
                    pendingCellCol = col;
                    // Don't update animations yet - wait for applyPendingRhythm
                } else {
                    // If not playing, set as active immediately
                    document.querySelectorAll('#rhythmGrid .grid-cell.active').forEach(c => {
                        c.classList.remove('active');
                    });
                    cell.classList.add('active');
                    currentBassDuration = bassDurationMultiplier;
                    currentHighDuration = highDurationMultiplier;
                    activeCellRow = row;
                    activeCellCol = col;
                    // Update animations (will be cleared since not playing)
                    updateGridHeaderAnimations(null, null, null, null);
                }
            }
            
            function updateGridHeaders() {
                const currentBPM = parseInt(document.getElementById('bpm-input')?.value || 120);
                const headers = calculateHeaders(currentBPM);
                const grid = document.getElementById('rhythmGrid');
                if (!grid) return;
                
                const allCells = grid.querySelectorAll('.grid-cell');
                allCells.forEach((cell, index) => {
                    if (cell.classList.contains('col-header')) {
                        const col = index;
                        if (col > 0 && col < headers.length) {
                            cell.textContent = headers[col];
                            // Update title attribute with note name
                            const multiplier = DURATION_MULTIPLIERS[col];
                            if (multiplier) {
                                const noteName = getNoteName(multiplier);
                                if (noteName) {
                                    cell.title = noteName;
                                }
                            }
                        }
                    } else if (cell.classList.contains('row-header')) {
                        const row = Math.floor(index / 8);
                        if (row > 0 && row < headers.length) {
                            cell.textContent = headers[row];
                            // Update title attribute with note name
                            const multiplier = DURATION_MULTIPLIERS[row];
                            if (multiplier) {
                                const noteName = getNoteName(multiplier);
                                if (noteName) {
                                    cell.title = noteName;
                                }
                            }
                        }
                    }
                });
            }
            
            function updateGridHeaderAnimations(bassDuration, highDuration, activeRow, activeCol) {
                const grid = document.getElementById('rhythmGrid');
                if (!grid) return;
                
                // Stop all animations first
                grid.querySelectorAll('.grid-cell.header.animated').forEach(header => {
                    header.classList.remove('animated');
                    header.style.animationDuration = '';
                });
                
                const isPlaying = window.getIsPlaying && window.getIsPlaying();
                if (!isPlaying || !bassDuration || !highDuration || activeRow === null || activeCol === null) {
                    return;

                    if (window.getIsPlaying && window.getIsPlaying()) {
                        // Apply pending changes first, then move to next cell
                        if (window.applyPendingVolumeMod) {
                            window.applyPendingVolumeMod();
                        }
                        applyVolumeModCellFromSequence();
                    } else {
                        // Stop sequence if not playing
                        if (volumeModSequenceInterval) {
                            clearInterval(volumeModSequenceInterval);
                            volumeModSequenceInterval = null;
                        }
                    }
                }, cycleDurationMs);
            }
            
            // Stop volume mod sequence cycling
            function stopVolumeModSequence() {
                if (volumeModSequenceInterval) {
                    clearInterval(volumeModSequenceInterval);
                    volumeModSequenceInterval = null;
                }
                currentVolumeModSequenceIndex = 0;

                                e.stopPropagation();
                                // Show tooltip using alert or custom tooltip
                                if (this.title) {
                                    // Create a temporary tooltip
                                    const tooltip = document.createElement('div');
                                    tooltip.textContent = this.title;
                                    tooltip.style.cssText = 'position: fixed; background: rgba(0, 0, 0, 0.9); color: white; padding: 8px 12px; border-radius: 4px; z-index: 10000; pointer-events: none; font-size: 13px; max-width: 300px; word-wrap: break-word;';
                                    document.body.appendChild(tooltip);
                                    
                                    const rect = this.getBoundingClientRect();
                                    tooltip.style.left = (rect.left + rect.width / 2 - tooltip.offsetWidth / 2) + 'px';
                                    tooltip.style.top = (rect.top - tooltip.offsetHeight - 8) + 'px';

            // Set initial collapsed state for all grids
            const rhythmGrid = document.getElementById('rhythmGrid');

            if (rhythmGrid) rhythmGrid.style.display = 'none';
            if (arpeggioGrid) arpeggioGrid.style.display = 'none';
            if (volumemodGrid) volumemodGrid.style.display = 'none';
            
            // Initialize grids
            createRhythmGrid();
            createArpeggioGrid();
            createVolumeModGrid();
            
            // Setup tooltips after grids are created
            setTimeout(() => {
                setupHeaderTooltips();
            }, 100);
            
            // Expose updateGridHeaders globally
            window.updateGridHeaders = updateGridHeaders;
            
            // Arpeggio sequence input handler
            const arpeggioSequenceInput = document.getElementById('arpeggio-sequence-input');
            if (arpeggioSequenceInput) {
                arpeggioSequenceInput.addEventListener('input', function() {
                    const input = arpeggioSequenceInput.value.trim();
                    arpeggioSequence = parseArpeggioSequence(input);
                    currentArpeggioSequenceIndex = 0;
                    
                    // If playing, restart sequence
                    if (window.getIsPlaying && window.getIsPlaying()) {
                        stopArpeggioSequence();

                    }
                });
                
                arpeggioSequenceInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {

                        if (window.getIsPlaying && window.getIsPlaying()) {

            // Cell sequence input handler
            const cellSequenceInput = document.getElementById('cell-sequence-input');
            if (cellSequenceInput) {
                cellSequenceInput.addEventListener('input', function() {
                    const input = cellSequenceInput.value.trim();
                    cellSequence = parseCellSequence(input);
                    currentSequenceIndex = 0;
                    
                    // If playing, restart sequence
                    if (window.getIsPlaying && window.getIsPlaying()) {
                        stopCellSequence();
                        startCellSequence();
                    }
                });
                
                cellSequenceInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        const input = cellSequenceInput.value.trim();
                        cellSequence = parseCellSequence(input);
                        currentSequenceIndex = 0;
                        
                        // If playing, restart sequence
                        if (window.getIsPlaying && window.getIsPlaying()) {
                            stopCellSequence();
                            startCellSequence();
                        }
                    }
                });
            }
            
            // Handle BPM input
            const bpmInput = document.getElementById('bpm-input');
            if (bpmInput) {
                // Initialize BPM from input value
                const initialBPM = parseInt(bpmInput.value);
                if (isFinite(initialBPM) && initialBPM >= 40 && initialBPM <= 240) {
                    if (window.setBPM) {
                        window.setBPM(initialBPM);
                    }
                }
                
                // Update BPM when input changes
                bpmInput.addEventListener('input', function() {
                    const bpm = parseInt(bpmInput.value);
                    if (isFinite(bpm) && bpm >= 40 && bpm <= 240) {
                        // Update grid headers
                        updateGridHeaders();
                        // Update chord playback BPM
                        if (window.setBPM) {
                            window.setBPM(bpm);
                        }
                        // Restart sequences with new BPM if playing
                        if (window.getIsPlaying && window.getIsPlaying()) {
                            if (cellSequence.length > 0) {
                                stopCellSequence();
                                startCellSequence();
                            }
                            if (arpeggioSequence.length > 0) {
                                stopArpeggioSequence();
                                startArpeggioSequence();
                            }
                            if (volumeModSequence.length > 0) {
                                stopVolumeModSequence();
                                startVolumeModSequence();
                            }
                        }
                    }
                });
            }
            
            // Load livid preset on page load and update dropdown
            // Wait for applySoundPreset to be available
            function loadLividPresetOnInit() {
                if (window.applySoundPreset) {
                    // Apply livid preset
                    console.log('Loading livid preset on page load...');
                    window.applySoundPreset('livid');
                    
                    // Update dropdown to show livid
                    const presetSelect = document.getElementById('preset-select');
                    if (presetSelect) {
                        presetSelect.value = 'livid';
                    }
                } else {
                    // Retry after a short delay
                    setTimeout(loadLividPresetOnInit, 100);
                }
            }
            
            // Start loading livid preset after a delay to ensure all modules are initialized
            setTimeout(loadLividPresetOnInit, 800);
            
            // Preset dropdown handler
            const presetSelect = document.getElementById('preset-select');
            if (presetSelect) {
                // Track the value before it gets cleared
                let pendingSelection = null;
                
                // Use input event which fires when selection changes - process preset here directly
                presetSelect.addEventListener('input', function(e) {
                    const selectedIndex = e.target.selectedIndex;
                    const presetName = selectedIndex >= 0 && selectedIndex < e.target.options.length 
                        ? e.target.options[selectedIndex].value 
                        : (e.target.value || null);
                    
                    if (presetName) {
                        pendingSelection = presetName;
                        // Process the preset immediately in input event
                        processPresetSelection(presetName);
                    }
                });
                
                // Function to process preset selection
                function processPresetSelection(presetName) {
                    if (!presetName) return;
                    
                    console.log(`Dropdown changed to: ${presetName}`);
                    
                    // Store the value FIRST to preserve it
                    const selectedValue = presetName;
                    
                    // Function to apply preset (with retry logic)
                    function tryApplyPreset() {
                        if (window.applySoundPreset) {
                            console.log('Calling applySoundPreset...');
                            
                            try {
                                window.applySoundPreset(selectedValue);
                            } catch (error) {
                                console.error('Error calling applySoundPreset:', error);
                            }
                            
                            // Ensure dropdown value stays
                            if (presetSelect.value !== selectedValue) {
                                presetSelect.value = selectedValue;
                            }
                        } else {
                            console.warn('applySoundPreset not available yet, retrying...');
                            setTimeout(tryApplyPreset, 100);
                        }
                    }
                    
                    // Try to apply preset
                    tryApplyPreset();
                    
                    // Also ensure value is preserved after a delay
                    setTimeout(() => {
                        if (presetSelect.value !== selectedValue) {
                            presetSelect.value = selectedValue;
                        }
                    }, 200);
                }
                
                // Also handle change event as fallback (but input should fire first)
                presetSelect.addEventListener('change', function(e) {
                    // Only process if we didn't already process via input event
                    if (pendingSelection) {
                        // Already processed in input event, just clear the flag
                        pendingSelection = null;
                        return;
                    }
                    
                    // Fallback: try to get value if input event didn't fire
                    const selectedIndex = e.target.selectedIndex;
                    const presetName = selectedIndex >= 0 && selectedIndex < e.target.options.length 
                        ? e.target.options[selectedIndex].value 
                        : (e.target.value || null);
                    
                    if (presetName) {
                        processPresetSelection(presetName);
                    }
                });
            }
            
            // Keyboard shortcut: Shift+S to toggle settings diff panel
            window.addEventListener('keydown', (e) => {
                if (e.shiftKey && e.key === 'S') {
                    e.preventDefault();
                    const diffPanel = document.getElementById('settings-diff-panel');
                    if (diffPanel) {
                        diffPanel.classList.toggle('visible');
                        // Refresh differences when showing
                        if (diffPanel.classList.contains('visible') && window.logSettingsDifferences) {
                            setTimeout(() => {
                                window.logSettingsDifferences();
                            }, 50);
                        }
                    }
                }
                
                // Keyboard shortcut: 9 to log camera settings (for debug and future use)
                if (e.key === '9' && !e.shiftKey && !e.ctrlKey && !e.altKey && !e.metaKey) {
                    if (window.camera && window.controls) {
                        const camera = window.camera;
                        const controls = window.controls;
                        const cameraSettings = {
                            position: {
                                x: camera.position.x.toFixed(3),
                                y: camera.position.y.toFixed(3),
                                z: camera.position.z.toFixed(3)
                            },
                            rotation: {
                                x: camera.rotation.x.toFixed(3),
                                y: camera.rotation.y.toFixed(3),
                                z: camera.rotation.z.toFixed(3)
                            },
                            fov: camera.fov,
                            aspect: camera.aspect,
                            near: camera.near,
                            far: camera.far,
                            target: {
                                x: controls.target.x.toFixed(3),
                                y: controls.target.y.toFixed(3),
                                z: controls.target.z.toFixed(3)
                            },
                            minDistance: controls.minDistance,
                            maxDistance: controls.maxDistance,
                            enableDamping: controls.enableDamping,
                            dampingFactor: controls.dampingFactor,
                            enableRotate: controls.enableRotate,
                            enableZoom: controls.enableZoom,
                            enablePan: controls.enablePan
                        };
                        console.log('📷 Camera Settings:', cameraSettings);
                        console.log('📋 Copy-paste format:', JSON.stringify(cameraSettings, null, 2));
                    } else {
                        console.warn('Camera or controls not available yet');
                    }
                }
            });
        });
